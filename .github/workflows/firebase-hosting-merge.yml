name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - env:
          VITE_API_KEY: '${{ vars.API_KEY }}'
          VITE_AUTH_DOMAIN: '${{ vars.AUTH_DOMAIN}}'
          VITE_PROJECT_ID: '${{ vars.PROJECT_ID}}'
          VITE_STORAGE_BUCKET: '${{ vars.STORAGE_BUCKET}}'
          VITE_MESSAGING_SENDER_ID: '${{ vars.MESSAGING_SENDER_ID}}'
          VITE_APP_ID: '${{ vars.APP_ID}}'
        run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: '${{ vars.PROJECT_ID }}'
